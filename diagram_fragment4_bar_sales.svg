<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <rect width="960" height="560" fill="#f8f9fa"/>
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Fragment 4 — Bar Sales: BarOrder, BarOrderItem</text>

  <!-- BarOrder x=40 y=60 w=420 -->
  <rect x="40" y="60" width="420" height="44" rx="4" fill="#5a4a0a"/>
  <text x="250" y="88" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">BarOrder</text>
  <rect x="40" y="104" width="420" height="28" fill="#d6e8fb"/>
  <text x="56" y="123" font-size="15" fill="#1a1a2e">🔑 bar_order_id</text>
  <text x="452" y="123" text-anchor="end" font-size="13" fill="#444">VARCHAR(10) PK</text>
  <rect x="40" y="132" width="420" height="28" fill="#e0f0e0"/>
  <text x="56" y="151" font-size="15" fill="#1a1a2e">🔗 event_id</text>
  <text x="452" y="151" text-anchor="end" font-size="13" fill="#1a6e1a">FK → VenueEvent</text>
  <rect x="40" y="160" width="420" height="28" fill="#e0f0e0"/>
  <text x="56" y="179" font-size="15" fill="#1a1a2e">🔗 customer_id</text>
  <text x="452" y="179" text-anchor="end" font-size="13" fill="#1a6e1a">FK → Customer (nullable)</text>
  <rect x="40" y="188" width="420" height="28" fill="#f5f5f5"/>
  <text x="56" y="207" font-size="15" fill="#1a1a2e">   order_timestamp</text>
  <text x="452" y="207" text-anchor="end" font-size="13" fill="#444">DATETIME NOT NULL</text>
  <rect x="40" y="216" width="420" height="28" fill="#ffffff"/>
  <text x="56" y="235" font-size="15" fill="#1a1a2e">   total_spend</text>
  <text x="452" y="235" text-anchor="end" font-size="13" fill="#444">DECIMAL(6,2) NOT NULL</text>
  <rect x="40" y="244" width="420" height="28" fill="#f5f5f5"/>
  <text x="56" y="263" font-size="15" fill="#1a1a2e">   order_channel</text>
  <text x="452" y="263" text-anchor="end" font-size="13" fill="#444">VARCHAR(30)</text>
  <rect x="40" y="60" width="420" height="212" rx="4" fill="none" stroke="#5a4a0a" stroke-width="2.5"/>
  <line x1="40" y1="104" x2="460" y2="104" stroke="#5a4a0a" stroke-width="1"/>

  <!-- BarOrderItem x=600 y=60 w=320 -->
  <rect x="600" y="60" width="320" height="44" rx="4" fill="#5a4a0a"/>
  <text x="760" y="88" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">BarOrderItem</text>
  <rect x="600" y="104" width="320" height="28" fill="#d6e8fb"/>
  <text x="616" y="123" font-size="15" fill="#1a1a2e">🔑 order_item_id</text>
  <text x="912" y="123" text-anchor="end" font-size="13" fill="#444">VARCHAR(10) PK</text>
  <rect x="600" y="132" width="320" height="28" fill="#e0f0e0"/>
  <text x="616" y="151" font-size="15" fill="#1a1a2e">🔗 bar_order_id</text>
  <text x="912" y="151" text-anchor="end" font-size="13" fill="#1a6e1a">FK → BarOrder</text>
  <rect x="600" y="160" width="320" height="28" fill="#f5f5f5"/>
  <text x="616" y="179" font-size="15" fill="#1a1a2e">   item_name</text>
  <text x="912" y="179" text-anchor="end" font-size="13" fill="#444">VARCHAR(50) NOT NULL</text>
  <rect x="600" y="188" width="320" height="28" fill="#ffffff"/>
  <text x="616" y="207" font-size="15" fill="#1a1a2e">   quantity</text>
  <text x="912" y="207" text-anchor="end" font-size="13" fill="#444">INT NOT NULL</text>
  <rect x="600" y="216" width="320" height="28" fill="#f5f5f5"/>
  <text x="616" y="235" font-size="15" fill="#1a1a2e">   unit_price</text>
  <text x="912" y="235" text-anchor="end" font-size="13" fill="#444">DECIMAL(6,2) NOT NULL</text>
  <rect x="600" y="60" width="320" height="184" rx="4" fill="none" stroke="#5a4a0a" stroke-width="2.5"/>
  <line x1="600" y1="104" x2="920" y2="104" stroke="#5a4a0a" stroke-width="1"/>

  <!-- Relationship BarOrder → BarOrderItem -->
  <line x1="460" y1="146" x2="540" y2="146" stroke="#1a6e1a" stroke-width="2" stroke-dasharray="7,3"/>
  <line x1="540" y1="146" x2="600" y2="146" stroke="#1a6e1a" stroke-width="2" stroke-dasharray="7,3"/>
  <line x1="460" y1="140" x2="460" y2="152" stroke="#1a6e1a" stroke-width="2"/>
  <line x1="600" y1="139" x2="588" y2="146" stroke="#1a6e1a" stroke-width="2"/>
  <line x1="600" y1="153" x2="588" y2="146" stroke="#1a6e1a" stroke-width="2"/>
  <text x="468" y="140" font-size="13" font-weight="bold" fill="#1a6e1a">1</text>
  <text x="568" y="140" font-size="13" font-weight="bold" fill="#1a6e1a">M</text>

  <!-- Design note -->
  <rect x="40" y="300" width="880" height="130" rx="4" fill="#fff8e1" stroke="#f0a500" stroke-width="1.5"/>
  <text x="56" y="324" font-size="14" font-weight="bold" fill="#7a5800">Design note — Why BarOrderItem was created (1NF fix)</text>
  <text x="56" y="348" font-size="13" fill="#1a1a2e">The original BarOrder table stored multiple items as a single text string (e.g. "2x Beer 1x Wine").</text>
  <text x="56" y="368" font-size="13" fill="#1a1a2e">This violated First Normal Form (1NF) because one cell held more than one value, making it impossible</text>
  <text x="56" y="388" font-size="13" fill="#1a1a2e">to query or aggregate individual item types. BarOrderItem stores each item atomically with quantity</text>
  <text x="56" y="408" font-size="13" fill="#1a1a2e">and unit_price, enabling line-total calculation (quantity × unit_price) and item-level sales analysis.</text>

  <!-- Legend -->
  <rect x="40" y="456" width="880" height="36" rx="4" fill="#e8e8e8"/>
  <text x="56" y="479" font-size="13" fill="#1a1a2e">🔑 Primary Key    🔗 Foreign Key    — — — Relationship    1 = one side    M = many side    VenueEvent and Customer connections shown in Fragments 1 and 3</text>
</svg>
